  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\u002Fdiv><\u002Fli>\n            <li><div class=\"t\">Licencja operatora radiowego<\u002Fdiv><div class=\"m\">UKE · Urząd Komunikacji Elektronicznej<\u002Fdiv><\u002Fli>\n          <\u002Ful>\n        <\u002Fsection>\n\n        <section>\n          <h3>Języki<\u002Fh3>\n          <ul class=\"langs\">\n            <li><div class=\"row\"><span class=\"n\">Polski<\u002Fspan><span class=\"lvl\">ojczysty<\u002Fspan><\u002Fdiv><div class=\"bar\"><i style=\"width:100%\"><\u002Fi><\u002Fdiv><\u002Fli>\n            <li><div class=\"row\"><span class=\"n\">Angielski<\u002Fspan><span class=\"lvl\">C1<\u002Fspan><\u002Fdiv><div class=\"bar\"><i style=\"width:85%\"><\u002Fi><\u002Fdiv><\u002Fli>\n          <\u002Ful>\n        <\u002Fsection>\n      <\u002Faside>\n\n      <main class=\"main\">\n        <div class=\"name\">Michał Wysocki<\u002Fdiv>\n        <div class=\"headline\">Badacz ML · Inżynier danych i ML · Deep-tech founder<\u002Fdiv>\n\n        <p class=\"summary\">Student Inżynierii i Analizy Danych, współzałożyciel dwóch startupów deep-tech i trzykrotny zwycięzca międzynarodowych hackathonów. Pracuję na styku badań i wdrożenia — od Edge AI na urządzeniach wbudowanych po wizję komputerową w systemach dronowych i obronnych (C-UAS). Rozwijam własny world model <b>Anchor-JEPA<\u002Fb> — badania nad stabilnością predykcji latentnych w długim horyzoncie.<\u002Fp>\n\n        <h2>Doświadczenie<\u002Fh2>\n\n        <div class=\"item\">\n          <div class=\"top\"><span class=\"role\">Współzałożyciel · Wiceprezes<\u002Fspan><span class=\"date\">maj 2026 – obecnie<\u002Fspan><\u002Fdiv>\n          <div class=\"org\">Umbris<\u002Fdiv>\n          <div class=\"meta\">Startup technologiczny (C-UAS / Edge AI) · Rzeszów<\u002Fdiv>\n          <ul>\n            <li>System detekcji dronów, wyrosły z nagrodzonego projektu DetMesh (C-UAS); faza prototypu, zespół 6 osób.<\u002Fli>\n            <li>Buduję warstwę detekcji — modele Edge AI na urządzeniach wbudowanych oraz projekt i integrację elektroniki.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <div class=\"item\">\n          <div class=\"top\"><span class=\"role\">Współzałożyciel · Project Manager<\u002Fspan><span class=\"date\">kwi 2026 – obecnie<\u002Fspan><\u002Fdiv>\n          <div class=\"org\">MedPrice<\u002Fdiv>\n          <div class=\"meta\">Startup technologiczny (medtech / AI) · Rzeszów<\u002Fdiv>\n          <ul>\n            <li>Analityczny standard zakupów dla ochrony zdrowia — platforma odczytuje dokumenty przetargowe (AI/OCR) i benchmarkuje ceny; faza rozwoju, zespół 4 osoby.<\u002Fli>\n            <li>Prowadzę projekt — zakres, koordynację zespołu, architekturę systemu i kierunek produktu.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <div class=\"item\">\n          <div class=\"top\"><span class=\"role\">Nauczyciel<\u002Fspan><span class=\"date\">kwi 2026 – obecnie<\u002Fspan><\u002Fdiv>\n          <div class=\"org\">Fundacja Wspierania Edukacji przy Stowarzyszeniu Dolina Lotnicza<\u002Fdiv>\n          <div class=\"meta\">Umowa zlecenie / freelancing · Rzeszów<\u002Fdiv>\n          <ul>\n            <li>Prowadziłem zajęcia z elektroniki, programowania i podstaw STEM dla kilkudziesięciu uczniów z całej Polski; przygotowanie do zawodów robotycznych.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <div class=\"item\">\n          <div class=\"top\"><span class=\"role\">Junior Data Scientist<\u002Fspan><span class=\"date\">lis 2025 – kwi 2026<\u002Fspan><\u002Fdiv>\n          <div class=\"org\">MTU Aero Engines Polska<\u002Fdiv>\n          <div class=\"meta\">Staż · Powiat rzeszowski · Praca hybrydowa<\u002Fdiv>\n          <ul>\n            <li>Współtworzyłem migrację hurtowni z ETL na ELT w dbt — modelowanie i transformacje danych.<\u002Fli>\n            <li>Zidentyfikowałem błędy w danych silników lotniczych podczas analizy baz danych, poprawiając jakość raportowania.<\u002Fli>\n            <li>Zbudowałem 3 dashboardy w Tableau oszczędzające czas analitykom biznesowym; automatyzacja przepływów danych w Pythonie i SQL.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <div class=\"item\">\n          <div class=\"top\"><span class=\"role\">Członek Zarządu<\u002Fspan><span class=\"date\">paź 2025 – obecnie<\u002Fspan><\u002Fdiv>\n          <div class=\"org\">Koło Naukowe Machine Learning, Politechnika Rzeszowska<\u002Fdiv>\n          <div class=\"meta\">Wolontariat · Rzeszów · Praca hybrydowa<\u002Fdiv>\n          <ul>\n            <li>Koordynacja wielu projektów AI/ML — planowanie harmonogramów, organizacja pracy zespołów i nadzór administracyjny.<\u002Fli>\n            <li>Alokacja zasobów, śledzenie postępów i prowadzenie dokumentacji od koncepcji po realizację.<\u002Fli>\n            <li>Budowanie uporządkowanego, produktywnego środowiska do badań i praktycznej nauki.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <h2>Wykształcenie<\u002Fh2>\n        <div class=\"item\">\n          <div class=\"top\"><span class=\"role\">Inżynieria i Analiza Danych — studia inż.<\u002Fspan><span class=\"date\">2024 – 2028<\u002Fspan><\u002Fdiv>\n          <div class=\"org\">Politechnika Rzeszowska im. Ignacego Łukasiewicza<\u002Fdiv>\n          <div class=\"meta\">Wydział Matematyki i Fizyki Stosowanej<\u002Fdiv>\n          <p class=\"edesc\">Kierunek na styku matematyki stosowanej i informatyki: solidny fundament z analizy, algebry liniowej, rachunku prawdopodobieństwa i statystyki, rozszerzony o programowanie, bazy danych, przetwarzanie big data oraz uczenie maszynowe i głębokie.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fmain>\n    <\u002Fdiv>\n\n    <!-- ---------- STRONA 2 ---------- -->\n    <div class=\"page p2\" data-screen-label=\"CV PL — s.2\">\n      <div class=\"runhead\"><span>Michał Wysocki — <b>Projekty &amp; Stack<\u002Fb><\u002Fspan><span>Strona 2 / 2<\u002Fspan><\u002Fdiv>\n\n      <aside class=\"side\">\n        <section>\n          <h3>Stack technologiczny<\u002Fh3>\n          <div class=\"cat\">\n            <span class=\"clbl\">Języki<\u002Fspan>\n            <div class=\"chips\"><span>Python<\u002Fspan><span>C++<\u002Fspan><span>C<\u002Fspan><span>R<\u002Fspan><span>SQL<\u002Fspan><span>JavaScript<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"cat\">\n            <span class=\"clbl\">ML / AI<\u002Fspan>\n            <div class=\"chips\"><span>PyTorch<\u002Fspan><span>Hugging Face<\u002Fspan><span>scikit-learn<\u002Fspan><span>LangChain<\u002Fspan><span>RAG<\u002Fspan><span>Transformery<\u002Fspan><span>CNN<\u002Fspan><span>LSTM<\u002Fspan><span>XGBoost<\u002Fspan><span>Computer Vision<\u002Fspan><span>Self-Supervised Learning<\u002Fspan><span>Edge AI<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"cat\">\n            <span class=\"clbl\">Dane<\u002Fspan>\n            <div class=\"chips\"><span>pandas<\u002Fspan><span>NumPy<\u002Fspan><span>matplotlib<\u002Fspan><span>seaborn<\u002Fspan><span>Spark<\u002Fspan><span>Kafka<\u002Fspan><span>Jupyter<\u002Fspan><span>Tableau<\u002Fspan><span>Excel<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"cat\">\n            <span class=\"clbl\">Bazy danych<\u002Fspan>\n            <div class=\"chips\"><span>PostgreSQL<\u002Fspan><span>Oracle<\u002Fspan><span>MongoDB<\u002Fspan><span>InfluxDB<\u002Fspan><span>ChromaDB<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"cat\">\n            <span class=\"clbl\">Edge / Hardware<\u002Fspan>\n            <div class=\"chips\"><span>Raspberry Pi<\u002Fspan><span>ESP32<\u002Fspan><span>STM<\u002Fspan><span>Systemy wbudowane<\u002Fspan><span>Elektronika<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"cat\">\n            <span class=\"clbl\">Narzędzia<\u002Fspan>\n            <div class=\"chips\"><span>Docker<\u002Fspan><span>Git<\u002Fspan><span>Linux<\u002Fspan><span>Hydra<\u002Fspan><span>MLflow<\u002Fspan><span>Weights &amp; Biases<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <section>\n          <h3>Obszary badań<\u002Fh3>\n          <ul class=\"rlist\">\n            <li>World models i dynamika latentna<\u002Fli>\n            <li>Continual learning<\u002Fli>\n            <li>Architektury post-transformerowe<\u002Fli>\n            <li>Uczenie federacyjne<\u002Fli>\n            <li>Edge AI i wnioskowanie na urządzeniach wbudowanych<\u002Fli>\n            <li>Optymalizacja i kompresja modeli<\u002Fli>\n            <li>Interpretowalne ML (XAI)<\u002Fli>\n            <li>Wizja komputerowa do detekcji obiektów<\u002Fli>\n          <\u002Ful>\n        <\u002Fsection>\n\n        <section>\n          <h3>Zainteresowania<\u002Fh3>\n          <div class=\"ilist\">\n            <span>Drony<\u002Fspan><span>Ham Radio<\u002Fspan><span>Elektronika<\u002Fspan><span>Sztuczna inteligencja<\u002Fspan><span>Ciągły rozwój<\u002Fspan><span>Prace naukowe<\u002Fspan><span>Nowe technologie<\u002Fspan><span>Książki<\u002Fspan><span>Siłownia<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Faside>\n\n      <main class=\"main\">\n        <h2 style=\"margin-top:0\">Nagrody<\u002Fh2>\n\n        <div class=\"awd\">\n          <div class=\"ah\"><span class=\"an\">Spaceshield Hack 2026 — 1. miejsce (kat. SPACE)<\u002Fspan><span class=\"ay\">PM · maj 2026<\u002Fspan><\u002Fdiv>\n          <p><b>AgloMeter<\u002Fb> — narzędzie diagnozujące wykluczenie komunikacyjne; międzynarodowy hackathon, 40 zespołów w kategorii (StARR × Polsa).<\u002Fp>\n          <ul>\n            <li>Działający dashboard łączący dane operacyjne MZK z obserwacją satelitarną (Copernicus, Sentinel) i rekomendacjami zmian w siatce połączeń.<\u002Fli>\n            <li>Jako PM poprowadziłem 6-osobowy zespół od koncepcji do wdrożenia.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <div class=\"awd\">\n          <div class=\"ah\"><span class=\"an\">Detect &amp; Defend 2026 — 1. miejsce<\u002Fspan><span class=\"ay\">Edge AI · kwi 2026<\u002Fspan><\u002Fdiv>\n          <p><b>DetMesh<\u002Fb> — wielosensorowy system C-UAS (obrona przed dronami); międzynarodowa seria EDTH, 30 zespołów (European Defence Tech Hackathon).<\u002Fp>\n          <ul>\n            <li>Detekcja i wizualizacja zagrożeń powietrznych w czasie rzeczywistym (Edge AI, Meshtastic, ROS2, TAK); <b>projekt przekształcił się w startup Umbris<\u002Fb>.<\u002Fli>\n            <li>Zaprojektowałem warstwę detekcji i AI.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <div class=\"awd\">\n          <div class=\"ah\"><span class=\"an\">HackCarpathia 2025 — 1. miejsce (kat. Drony)<\u002Fspan><span class=\"ay\">Data Science · maj 2025<\u002Fspan><\u002Fdiv>\n          <p><b>WildGuard<\u002Fb> — wczesne wykrywanie pożarów z dronów; międzynarodowy hackathon, 40 zespołów w kategorii (PCI × WSIiZ).<\u002Fp>\n          <ul>\n            <li>Działający dashboard powiadamiający służby ratunkowe w czasie rzeczywistym.<\u002Fli>\n            <li>Zbudowałem warstwę Data Science — pozyskanie, przygotowanie i analiza danych.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <h2>Projekty<\u002Fh2>\n\n        <div class=\"proj\">\n          <div class=\"ph\"><span class=\"pname\">InsightML<\u002Fspan><span class=\"prole\">Auto Data Science · Agenci AI<\u002Fspan><\u002Fdiv>\n          <ul>\n            <li>Platforma automatycznego data science — analizuje surowe zbiory danych pod kątem ML, wyciąga statystyki i wnioski oraz sugeruje kolejne kroki i przekształcenia.<\u002Fli>\n            <li>Profilowanie danych, statystyki opisowe, wykrywanie zależności i problemów jakości — z automatyczną interpretacją wyników.<\u002Fli>\n            <li>Zbudowana w oparciu o agentów AI, którzy rekomendują czyszczenie, feature engineering i transformacje przygotowujące dane pod modele.<\u002Fli>\n          <\u002Ful>\n          <div class=\"ptags\"><span>Agenci AI<\u002Fspan><span>AutoML<\u002Fspan><span>pandas / NumPy<\u002Fspan><span>Python<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"proj\">\n          <div class=\"ph\"><span class=\"pname\">Doc<\u002Fspan><span class=\"prole\">Agenci AI<\u002Fspan><\u002Fdiv>\n          <ul>\n            <li>System wspierający naukę, oparty na agentach AI — od materiałów na studia, przez naukę kodu z dokumentacji technicznej, po rozumienie publikacji naukowych.<\u002Fli>\n            <li>Agenci rozkładają złożone źródła (dokumentacje, papery) na przystępne wyjaśnienia i spersonalizowane ścieżki nauki.<\u002Fli>\n            <li>Interfejs użytkownika zbudowany w React.<\u002Fli>\n          <\u002Ful>\n          <div class=\"ptags\"><span>Agenci AI<\u002Fspan><span>LLM / RAG<\u002Fspan><span>React<\u002Fspan><span>Python<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"proj\">\n          <div class=\"ph\"><span class=\"pname\">Drone Audio Detection<\u002Fspan><span class=\"prole\">Detekcja akustyczna<\u002Fspan><\u002Fdiv>\n          <ul>\n            <li>Detekcja dronów na podstawie sygnatury akustycznej.<\u002Fli>\n            <li>Pipeline: augmentacja szumem otoczenia, cechy MFCC (delta i delta-delta), klasyfikator Random Forest z grupowym podziałem danych (anti-leakage).<\u002Fli>\n            <li>Tryb czasu rzeczywistego — wnioskowanie na strumieniu z mikrofonu (bufor 1 s, 16 kHz).<\u002Fli>\n            <li>Konfiguracja przez Hydra, logowanie eksperymentów w Weights &amp; Biases.<\u002Fli>\n          <\u002Ful>\n          <div class=\"ptags\"><span>librosa / MFCC<\u002Fspan><span>scikit-learn<\u002Fspan><span>Random Forest<\u002Fspan><span>Hydra · W&amp;B<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <h2>Badania<\u002Fh2>\n\n        <div class=\"proj\">\n          <div class=\"ph\"><span class=\"pname\">Anchor-JEPA<\u002Fspan><span class=\"prole\">Autorski world model · projekt badawczy w toku<\u002Fspan><\u002Fdiv>\n          <p>World model w paradygmacie JEPA z autorskim mechanizmem <b>Anchor<\u002Fb>, który kotwiczy predykcje w rzeczywistości i utrzymuje spójność reprezentacji w długim horyzoncie czasowym.<\u002Fp>\n          <ul>\n            <li>Anchor łączy statystyczno-probabilistyczne przewidywanie trajektorii latentnych z ich aktywną korektą — ogranicza dryf przestrzeni latentnej (latent drift) i kumulację błędu przy predykcji wielokrokowej.<\u002Fli>\n          <\u002Ful>\n          <div class=\"ptags\"><span>World Models<\u002Fspan><span>JEPA<\u002Fspan><span>Self-Supervised<\u002Fspan><span>PyTorch<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fmain>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- ============================================================ -->\n  <!-- ============================ ENGLISH ======================= -->\n  <!-- ============================================================ -->\n  <div class=\"lang\" data-lang=\"en\">\n\n    <!-- ---------- PAGE 1 ---------- -->\n    <div class=\"page\" data-screen-label=\"CV EN — p.1\">\n      <aside class=\"side\">\n        <img class=\"photo\" src=\"23b1d3f3-7c9e-4d69-983b-147ce53116d1\" alt=\"Michał Wysocki\">\n\n        <section>\n          <h3>Contact<\u002Fh3>\n          <ul class=\"contact\">\n            <li><span class=\"lbl\">Phone<\u002Fspan><a href=\"tel:+48795543723\">+48 795 543 723<\u002Fa><\u002Fli>\n            <li><span class=\"lbl\">E-mail<\u002Fspan><a href=\"mailto:michalwysocki.priv@proton.me\">michalwysocki.priv@proton.me<\u002Fa><\u002Fli>\n            <li><span class=\"lbl\">Website<\u002Fspan><a href=\"https://michalwysocki.com\">michalwysocki.com<\u002Fa><\u002Fli>\n            <li><span class=\"lbl\">LinkedIn<\u002Fspan><a href=\"https://www.linkedin.com/in/michalaniol1/\">linkedin.com/in/michalaniol1<\u002Fa><\u002Fli>\n            <li><span class=\"lbl\">GitHub<\u002Fspan><a href=\"https://github.com/m1chelangelo11\">github.com/m1chelangelo11<\u002Fa><\u002Fli>\n            <li><span class=\"lbl\">Location<\u002Fspan>Rzeszów, Poland<\u002Fli>\n          <\u002Ful>\n        <\u002Fsection>\n\n        <section>\n          <h3>Core competencies<\u002Fh3>\n          <div class=\"chips\">\n            <span>Machine Learning<\u002Fspan><span>Deep Learning<\u002Fspan><span>Data Science<\u002Fspan><span>Data Analysis<\u002Fspan><span>Data Engineering<\u002Fspan><span>Computer Vision<\u002Fspan><span>Edge AI<\u002Fspan><span>World models<\u002Fspan><span>IoT<\u002Fspan><span>Model Optimization<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <section>\n          <h3>Soft skills<\u002Fh3>\n          <div class=\"chips\">\n            <span>Leadership<\u002Fspan><span>Decision-making<\u002Fspan><span>Project Management<\u002Fspan><span>Teamwork<\u002Fspan><span>Communication<\u002Fspan><span>Analytical Thinking<\u002Fspan><span>Time Management<\u002Fspan><span>Mentoring<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <section>\n          <h3>Licenses<\u002Fh3>\n          <ul class=\"lic\">\n            <li><div class=\"t\">STS-01 Drone License<\u002Fdiv><div class=\"m\">Civil Aviation Authority · A1/A2/A3 · 2026–2031<\u002Fdiv><\u002Fli>\n            <li><div class=\"t\">Radio Operator License<\u002Fdiv><div class=\"m\">UKE · Office of Electronic Communications<\u002Fdiv><\u002Fli>\n          <\u002Ful>\n        <\u002Fsection>\n\n        <section>\n          <h3>Languages<\u002Fh3>\n          <ul class=\"langs\">\n            <li><div class=\"row\"><span class=\"n\">Polish<\u002Fspan><span class=\"lvl\">native<\u002Fspan><\u002Fdiv><div class=\"bar\"><i style=\"width:100%\"><\u002Fi><\u002Fdiv><\u002Fli>\n            <li><div class=\"row\"><span class=\"n\">English<\u002Fspan><span class=\"lvl\">C1<\u002Fspan><\u002Fdiv><div class=\"bar\"><i style=\"width:85%\"><\u002Fi><\u002Fdiv><\u002Fli>\n          <\u002Ful>\n        <\u002Fsection>\n      <\u002Faside>\n\n      <main class=\"main\">\n        <div class=\"name\">Michał Wysocki<\u002Fdiv>\n        <div class=\"headline\">ML Researcher · Data &amp; ML Engineer · Deep-tech founder<\u002Fdiv>\n\n        <p class=\"summary\">Data Engineering &amp; Analytics student, co-founder of two deep-tech startups and a three-time international hackathon winner. I work at the intersection of research and deployment — from Edge AI on embedded devices to computer vision for drone and defense systems (C-UAS). I'm developing my own world model, <b>Anchor-JEPA<\u002Fb> — research on the long-horizon stability of latent predictions.<\u002Fp>\n\n        <h2>Experience<\u002Fh2>\n\n        <div class=\"item\">\n          <div class=\"top\"><span class=\"role\">Co-founder · Vice President<\u002Fspan><span class=\"date\">May 2026 – Present<\u002Fspan><\u002Fdiv>\n          <div class=\"org\">Umbris<\u002Fdiv>\n          <div class=\"meta\">Technology startup (C-UAS / Edge AI) · Rzeszów<\u002Fdiv>\n          <ul>\n            <li>Drone-detection system, grown out of the award-winning DetMesh (C-UAS) project; prototype stage, team of 6.<\u002Fli>\n            <li>Build the detection layer — Edge AI models on embedded devices, plus electronics design and integration.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <div class=\"item\">\n          <div class=\"top\"><span class=\"role\">Co-founder · Project Manager<\u002Fspan><span class=\"date\">Apr 2026 – Present<\u002Fspan><\u002Fdiv>\n          <div class=\"org\">MedPrice<\u002Fdiv>\n          <div class=\"meta\">Technology startup (medtech / AI) · Rzeszów<\u002Fdiv>\n          <ul>\n            <li>An analytical purchasing standard for healthcare — the platform reads tender documents (AI/OCR) and benchmarks prices; growth stage, team of 4.<\u002Fli>\n            <li>Run the project — scope, team coordination, system architecture and product direction.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <div class=\"item\">\n          <div class=\"top\"><span class=\"role\">Teacher<\u002Fspan><span class=\"date\">Apr 2026 – Present<\u002Fspan><\u002Fdiv>\n          <div class=\"org\">Education Support Foundation, Aviation Valley Association<\u002Fdiv>\n          <div class=\"meta\">Freelance / contract · Rzeszów<\u002Fdiv>\n          <ul>\n            <li>Taught electronics, programming and STEM fundamentals to several dozen students from across Poland; preparing them for robotics competitions.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <div class=\"item\">\n          <div class=\"top\"><span class=\"role\">Junior Data Scientist<\u002Fspan><span class=\"date\">Nov 2025 – Apr 2026<\u002Fspan><\u002Fdiv>\n          <div class=\"org\">MTU Aero Engines Polska<\u002Fdiv>\n          <div class=\"meta\">Internship · Rzeszów County · Hybrid<\u002Fdiv>\n          <ul>\n            <li>Helped migrate the data warehouse from ETL to ELT in dbt — data modeling and transformations.<\u002Fli>\n            <li>Identified errors in aircraft-engine data while analyzing databases, improving reporting quality.<\u002Fli>\n            <li>Built 3 Tableau dashboards that saved business analysts time; automated data workflows with Python and SQL.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <div class=\"item\">\n          <div class=\"top\"><span class=\"role\">Board Member<\u002Fspan><span class=\"date\">Oct 2025 – Present<\u002Fspan><\u002Fdiv>\n          <div class=\"org\">Machine Learning Science Club, Rzeszów University of Technology<\u002Fdiv>\n          <div class=\"meta\">Volunteer · Rzeszów · Hybrid<\u002Fdiv>\n          <ul>\n            <li>Coordinate multiple AI/ML projects — planning timelines, organizing team activities and overseeing administrative tasks.<\u002Fli>\n            <li>Allocate resources, track progress and maintain documentation from inception to completion.<\u002Fli>\n            <li>Foster a structured, productive environment for research and hands-on learning.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <h2>Education<\u002Fh2>\n        <div class=\"item\">\n          <div class=\"top\"><span class=\"role\">B.Eng. Data Engineering &amp; Analytics<\u002Fspan><span class=\"date\">2024 – 2028<\u002Fspan><\u002Fdiv>\n          <div class=\"org\">Rzeszów University of Technology (Ignacy Łukasiewicz)<\u002Fdiv>\n          <div class=\"meta\">Faculty of Mathematics and Applied Physics<\u002Fdiv>\n          <p class=\"edesc\">A program at the intersection of applied mathematics and computer science: a solid foundation in calculus, linear algebra, probability and statistics, extended with programming, databases, big-data processing, and machine &amp; deep learning.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fmain>\n    <\u002Fdiv>\n\n    <!-- ---------- PAGE 2 ---------- -->\n    <div class=\"page p2\" data-screen-label=\"CV EN — p.2\">\n      <div class=\"runhead\"><span>Michał Wysocki — <b>Projects &amp; Stack<\u002Fb><\u002Fspan><span>Page 2 / 2<\u002Fspan><\u002Fdiv>\n\n      <aside class=\"side\">\n        <section>\n          <h3>Technical stack<\u002Fh3>\n          <div class=\"cat\">\n            <span class=\"clbl\">Languages<\u002Fspan>\n            <div class=\"chips\"><span>Python<\u002Fspan><span>C++<\u002Fspan><span>C<\u002Fspan><span>R<\u002Fspan><span>SQL<\u002Fspan><span>JavaScript<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"cat\">\n            <span class=\"clbl\">ML / AI<\u002Fspan>\n            <div class=\"chips\"><span>PyTorch<\u002Fspan><span>Hugging Face<\u002Fspan><span>scikit-learn<\u002Fspan><span>LangChain<\u002Fspan><span>RAG<\u002Fspan><span>Transformers<\u002Fspan><span>CNN<\u002Fspan><span>LSTM<\u002Fspan><span>XGBoost<\u002Fspan><span>Computer Vision<\u002Fspan><span>Self-Supervised Learning<\u002Fspan><span>Edge AI<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"cat\">\n            <span class=\"clbl\">Data<\u002Fspan>\n            <div class=\"chips\"><span>pandas<\u002Fspan><span>NumPy<\u002Fspan><span>matplotlib<\u002Fspan><span>seaborn<\u002Fspan><span>Spark<\u002Fspan><span>Kafka<\u002Fspan><span>Jupyter<\u002Fspan><span>Tableau<\u002Fspan><span>Excel<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"cat\">\n            <span class=\"clbl\">Databases<\u002Fspan>\n            <div class=\"chips\"><span>PostgreSQL<\u002Fspan><span>Oracle<\u002Fspan><span>MongoDB<\u002Fspan><span>InfluxDB<\u002Fspan><span>ChromaDB<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"cat\">\n            <span class=\"clbl\">Edge / Hardware<\u002Fspan>\n            <div class=\"chips\"><span>Raspberry Pi<\u002Fspan><span>ESP32<\u002Fspan><span>STM<\u002Fspan><span>Embedded Systems<\u002Fspan><span>Electronics<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"cat\">\n            <span class=\"clbl\">Tools<\u002Fspan>\n            <div class=\"chips\"><span>Docker<\u002Fspan><span>Git<\u002Fspan><span>Linux<\u002Fspan><span>Hydra<\u002Fspan><span>MLflow<\u002Fspan><span>Weights &amp; Biases<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <section>\n          <h3>Research interests<\u002Fh3>\n          <ul class=\"rlist\">\n            <li>World models &amp; latent dynamics<\u002Fli>\n            <li>Continual learning<\u002Fli>\n            <li>Post-transformer architectures<\u002Fli>\n            <li>Federated learning<\u002Fli>\n            <li>Edge AI and on-device inference<\u002Fli>\n            <li>Model optimization and compression<\u002Fli>\n            <li>Interpretable ML (XAI)<\u002Fli>\n            <li>Computer vision for object detection<\u002Fli>\n          <\u002Ful>\n        <\u002Fsection>\n\n        <section>\n          <h3>Interests<\u002Fh3>\n          <div class=\"ilist\">\n            <span>Drones<\u002Fspan><span>Ham Radio<\u002Fspan><span>Electronics<\u002Fspan><span>Artificial Intelligence<\u002Fspan><span>Continuous learning<\u002Fspan><span>Academic research<\u002Fspan><span>Emerging tech<\u002Fspan><span>Books<\u002Fspan><span>Gym<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Faside>\n\n      <main class=\"main\">\n        <h2 style=\"margin-top:0\">Awards<\u002Fh2>\n\n        <div class=\"awd\">\n          <div class=\"ah\"><span class=\"an\">Spaceshield Hack 2026 — 1st place (SPACE)<\u002Fspan><span class=\"ay\">PM · May 2026<\u002Fspan><\u002Fdiv>\n          <p><b>AgloMeter<\u002Fb> — a tool diagnosing transport exclusion; international hackathon, 40 teams in the category (StARR × Polsa).<\u002Fp>\n          <ul>\n            <li>A working dashboard combining municipal transit (MZK) operational data with satellite Earth observation (Copernicus, Sentinel) and network-redesign recommendations.<\u002Fli>\n            <li>As PM, led a 6-person team from concept to a working build.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <div class=\"awd\">\n          <div class=\"ah\"><span class=\"an\">Detect &amp; Defend 2026 — 1st place<\u002Fspan><span class=\"ay\">Edge AI · Apr 2026<\u002Fspan><\u002Fdiv>\n          <p><b>DetMesh<\u002Fb> — a multi-sensor C-UAS (counter-drone) system; international EDTH series, 30 teams (European Defence Tech Hackathon).<\u002Fp>\n          <ul>\n            <li>Real-time detection and visualization of aerial threats (Edge AI, Meshtastic, ROS2, TAK); <b>the project grew into the Umbris startup<\u002Fb>.<\u002Fli>\n            <li>Designed the detection and AI layer.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <div class=\"awd\">\n          <div class=\"ah\"><span class=\"an\">HackCarpathia 2025 — 1st place (Drones)<\u002Fspan><span class=\"ay\">Data Science · May 2025<\u002Fspan><\u002Fdiv>\n          <p><b>WildGuard<\u002Fb> — early wildfire detection from drones; international hackathon, 40 teams in the category (PCI × WSIiZ).<\u002Fp>\n          <ul>\n            <li>A working dashboard alerting emergency services in real time.<\u002Fli>\n            <li>Built the Data Science layer — data acquisition, preparation and analysis.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n        <h2>Projects<\u002Fh2>\n\n        <div class=\"proj\">\n          <div class=\"ph\"><span class=\"pname\">InsightML<\u002Fspan><span class=\"prole\">Auto Data Science · AI agents<\u002Fspan><\u002Fdiv>\n          <ul>\n            <li>An automated data-science platform — it analyzes raw datasets for ML, extracts statistics and insights, and suggests next steps and transformations.<\u002Fli>\n            <li>Data profiling, descriptive statistics, dependency detection and data-quality checks — with automatic interpretation of the results.<\u002Fli>\n            <li>Built around AI agents that recommend cleaning, feature engineering and transformations to prepare data for modeling.<\u002Fli>\n          <\u002Ful>\n          <div class=\"ptags\"><span>AI Agents<\u002Fspan><span>AutoML<\u002Fspan><span>pandas / NumPy<\u002Fspan><span>Python<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"proj\">\n          <div class=\"ph\"><span class=\"pname\">Doc<\u002Fspan><span class=\"prole\">AI agents<\u002Fspan><\u002Fdiv>\n          <ul>\n            <li>An AI-agent–based learning system — spanning study materials, learning code from technical documentation, and understanding research papers.<\u002Fli>\n            <li>Agents break complex sources (documentation, papers) into clear explanations and personalized learning paths.<\u002Fli>\n            <li>User interface built in React.<\u002Fli>\n          <\u002Ful>\n          <div class=\"ptags\"><span>AI Agents<\u002Fspan><span>LLM / RAG<\u002Fspan><span>React<\u002Fspan><span>Python<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"proj\">\n          <div class=\"ph\"><span class=\"pname\">Drone Audio Detection<\u002Fspan><span class=\"prole\">Acoustic detection<\u002Fspan><\u002Fdiv>\n          <ul>\n            <li>Drone detection from acoustic signature.<\u002Fli>\n            <li>Pipeline: ambient-noise augmentation, MFCC features (delta and delta-delta), Random Forest classifier with group-aware splitting (anti-leakage).<\u002Fli>\n            <li>Real-time mode — inference on a live microphone stream (1 s buffer, 16 kHz).<\u002Fli>\n            <li>Hydra-based configuration and Weights &amp; Biases experiment tracking.<\u002Fli>\n          <\u002Ful>\n          <div class=\"ptags\"><span>librosa / MFCC<\u002Fspan><span>scikit-learn<\u002Fspan><span>Random Forest<\u002Fspan><span>Hydra · W&amp;B<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <h2>Research<\u002Fh2>\n\n        <div class=\"proj\">\n          <div class=\"ph\"><span class=\"pname\">Anchor-JEPA<\u002Fspan><span class=\"prole\">Original world model · research in progress<\u002Fspan><\u002Fdiv>\n          <p>A world model in the JEPA paradigm with an original <b>Anchor<\u002Fb> mechanism that anchors predictions to reality and keeps representations consistent over long time horizons.<\u002Fp>\n          <ul>\n            <li>Anchor couples statistical–probabilistic forecasting of latent trajectories with their active correction — limiting latent drift and error accumulation in multi-step prediction.<\u002Fli>\n          <\u002Ful>\n          <div class=\"ptags\"><span>World Models<\u002Fspan><span>JEPA<\u002Fspan><span>Self-Supervised<\u002Fspan><span>PyTorch<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fmain>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<script>\n  const bar = document.getElementById('langbar');\n  const pages = { pl: document.querySelector('.lang[data-lang=\"pl\"]'), en: document.querySelector('.lang[data-lang=\"en\"]') };\n  bar.addEventListener('click', e => {\n    const b = e.target.closest('button'); if(!b) return;\n    const l = b.dataset.l;\n    bar.querySelectorAll('button').forEach(x => x.classList.toggle('active', x === b));\n    pages.pl.classList.toggle('show', l === 'pl');\n    pages.en.classList.toggle('show', l === 'en');\n    document.documentElement.lang = l;\n  });\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
